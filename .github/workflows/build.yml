name: Build & Release LANTERN

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install setuptools numpy torch --quiet
          pip3 install --no-build-isolation openai-whisper==20231117
          pip3 install -r backend/requirements.txt pyinstaller

      - name: Download ffmpeg
        run: |
          chmod +x scripts/download-ffmpeg.sh
          ./scripts/download-ffmpeg.sh mac

      - name: Build backend executable
        run: cd backend && python3 build_backend.py

      - name: Build Electron app (macOS)
        run: npm run build && npx electron-builder --mac --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          path: release/*.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install setuptools numpy torch --quiet
          python -m pip install --no-build-isolation openai-whisper==20231117
          python -m pip install flask==3.0.0 flask-cors==4.0.0 pandas==2.1.4 numpy==1.26.2 werkzeug==3.0.1 networkx==3.2.1 pyinstaller

      - name: Download ffmpeg
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path ffmpeg-bin
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "$env:TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:TEMP\ffmpeg.zip" -DestinationPath "$env:TEMP\ffmpeg-extract" -Force
          $ffmpegExe = Get-ChildItem -Path "$env:TEMP\ffmpeg-extract" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName -Destination "ffmpeg-bin\ffmpeg.exe"

      - name: Build backend executable
        run: cd backend && python build_backend.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Build Electron app (Windows)
        run: npm run build && npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/*.exe
          retention-days: 30

  release:
    needs: [build-mac, build-windows]
    if: always() && startsWith(github.ref, 'refs/tags/') && (needs.build-mac.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

